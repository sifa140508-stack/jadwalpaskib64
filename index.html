<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jadwal Paskibra - Merah Putih Edition</title>

    <!-- 1. FONT: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- 2. CSS CUSTOM -->
    <link rel="stylesheet" href="style.css" />

    <!-- 3. TAILWIND CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 4. ANIMATION LIBRARIES -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body class="antialiased">
    <!-- PRELOADER -->
    <div
      id="flagPreloader"
      class="fixed inset-0 z-[9999] bg-white flex flex-col items-center justify-center"
    >
      <!-- Tiang & Bendera Container -->
      <div class="relative w-64 h-64 flex justify-center items-end mb-8">
        <!-- Tiang -->
        <div class="w-1.5 h-full bg-gray-800 rounded-t-full relative z-10">
          <!-- Bola Emas di Puncak -->
          <div
            class="absolute -top-3 -left-1.5 w-4 h-4 bg-yellow-500 rounded-full shadow-sm border border-yellow-600"
          ></div>
        </div>

        <!-- Bendera (Akan Bergerak Naik) -->
        <div
          id="movingFlag"
          class="absolute bottom-0 left-[calc(50%+4px)] flex flex-col shadow-lg origin-left"
        >
          <div class="w-24 h-8 bg-merah-indo rounded-tr-md"></div>
          <div
            class="w-24 h-8 bg-gray-100 border border-t-0 border-gray-100 rounded-br-md"
          ></div>
        </div>

        <!-- Podium/Tanah -->
        <div class="absolute bottom-0 w-32 h-1 bg-gray-300 rounded-full"></div>
      </div>

      <!-- Teks Loading -->
      <div class="text-center">
        <h2 class="text-2xl font-black text-gray-800 tracking-tighter mb-1">
          PASKIBRA <span class="text-merah-indo">64</span>
        </h2>
        <p
          class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.3em] animate-pulse"
        >
          Menyiapkan Pasukan...
        </p>
      </div>
    </div>

    <div class="watermark-bg"></div>
    <!-- Navbar Mengambang -->
    <nav class="fixed top-0 w-full z-50 px-4 py-4" id="navbar">
      <div
        class="max-w-6xl mx-auto glass-card rounded-full px-6 py-3 flex flex-col md:flex-row justify-between items-center gap-4 shadow-lg"
      >
        <!-- Logo -->
        <div class="flex items-center gap-3">
          <div
            class="w-10 h-10 bg-merah-indo rounded-full flex items-center justify-center text-white font-bold shadow-md shadow-red-500/30"
          >
            <span class="tracking-tighter">64</span>
          </div>
          <div>
            <h1 class="text-lg font-extrabold tracking-tight text-gray-900">
              PASKIBRA <span class="text-merah-indo">INDONESIA</span>
            </h1>
            <p
              class="text-[10px] font-semibold text-gray-500 uppercase tracking-[0.2em]"
            >
              Jadwal Penugasan 2026
            </p>
          </div>
        </div>

        <!-- Jam & Search & Filter -->
        <div
          class="flex flex-col md:flex-row items-center gap-3 w-full md:w-auto"
        >
          <!-- Jam WIB -->
          <div
            class="hidden md:flex items-center gap-2 bg-gray-100 px-4 py-2 rounded-full border border-gray-200"
          >
            <div class="w-2 h-2 bg-merah-indo rounded-full animate-pulse"></div>
            <span
              id="wibClock"
              class="text-xs font-mono font-bold text-gray-700 w-36 text-center"
              >Memuat Waktu...</span
            >
          </div>

          <!-- Wrapper Filter & Search -->
          <div
            class="flex items-center gap-2 w-full md:w-auto bg-gray-50 border border-gray-200 rounded-full p-1 focus-within:ring-2 focus-within:ring-merah-indo/50 transition-all"
          >
            <!-- Dropdown Filter -->
            <div class="relative group border-r border-gray-200 pr-2">
              <select
                id="roleFilter"
                class="appearance-none bg-transparent py-1.5 pl-4 pr-8 text-xs font-bold text-gray-600 focus:outline-none cursor-pointer hover:text-merah-indo transition-colors"
              >
                <option value="all">Semua Posisi</option>
                <option value="pickup">Pengambil (Pagi)</option>
                <option value="raise">Pasukan Naik</option>
                <option value="lower">Pasukan Turun</option>
                <option value="return">Pengembali (Sore)</option>
              </select>
              <!-- Panah Icon -->
              <div
                class="absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none"
              >
                <i data-lucide="chevron-down" class="w-3 h-3 text-gray-400"></i>
              </div>
            </div>

            <!-- Search Input -->
            <div class="relative w-full md:w-48">
              <input
                type="text"
                id="searchInput"
                class="w-full bg-transparent border-none py-1 text-sm focus:outline-none focus:ring-0 placeholder-gray-400"
                placeholder="Cari Nama..."
              />
              <i
                data-lucide="search"
                class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-300"
              ></i>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <!-- Konten Utama -->
    <main class="pt-32 pb-24 px-4 max-w-6xl mx-auto min-h-screen">
      <!-- Area Countdown -->
      <div
        id="countdownContainer"
        class="mb-8 hidden opacity-0 translate-y-[-20px]"
      ></div>

      <!-- Header Teks -->
      <div class="mb-12 text-center" id="headerText">
        <div
          class="inline-block px-3 py-1 bg-red-50 text-merah-indo text-xs font-bold rounded-full mb-3 border border-red-100"
        >
          MERAH DARAHKU, PUTIH TULANGKU
        </div>
        <h2 class="text-4xl md:text-5xl font-black text-gray-900 mb-2">
          Jadwal Piket <span class="text-merah-indo">SPISIXFO</span>
        </h2>
        <p class="text-gray-500 font-medium">Periode 4 Maret - 19 Mei 2026</p>

        <!-- Weather Widget (Skeleton Mode Awal) -->
        <div
          id="weatherWidget"
          class="mx-auto mb-6 inline-flex items-center gap-3 px-4 py-2 rounded-full border border-gray-100 bg-white/50 backdrop-blur-sm transition-all duration-300"
        >
          <div
            id="weatherIconWrapper"
            class="p-1.5 rounded-full bg-white shadow-sm"
          >
            <!-- Skeleton Icon -->
            <div class="skeleton w-5 h-5 skeleton-circle"></div>
          </div>
          <div class="text-left">
            <!-- Skeleton Text -->
            <div id="weatherTemp" class="skeleton w-16 h-3 mb-1"></div>
            <div id="weatherDesc" class="skeleton w-24 h-2"></div>
          </div>
        </div>

        <!-- [TAMBAHKAN KODE INI] -->
        <!-- Progress Bar Container -->
        <div class="max-w-md mx-auto mt-6">
          <div class="flex justify-between items-end mb-2 px-1">
            <span
              class="text-[10px] font-bold text-gray-400 uppercase tracking-widest"
              >Start</span
            >
            <span id="progressLabel" class="text-xs font-bold text-merah-indo"
              >0% Selesai</span
            >
            <span
              class="text-[10px] font-bold text-gray-400 uppercase tracking-widest"
              >Finish</span
            >
          </div>

          <!-- Track Bar -->
          <div
            class="h-3 w-full bg-gray-200 rounded-full overflow-hidden shadow-inner border border-gray-300 relative"
          >
            <!-- Fill Bar (Merah) -->
            <div
              id="progressBar"
              class="h-full bg-gradient-to-r from-merah-indo to-red-400 rounded-full w-0 transition-all duration-1000 ease-out relative"
            >
              <!-- Efek Kilau Putih -->
              <div
                class="absolute top-0 bottom-0 right-0 w-full bg-gradient-to-l from-white/30 to-transparent opacity-50"
              ></div>
            </div>
          </div>

          <p class="text-[10px] text-gray-400 mt-2 italic">
            Tetap semangat, perjalanan masih panjang guyss!!!
          </p>
        </div>
      </div>

      <div
        id="scheduleGrid"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
      >
        <!-- [SKELETON DUMMY CARDS - HANYA MUNCUL SAAT LOADING] -->
        <!-- Ulangi div ini 3 kali biar kelihatan penuh -->

        <!-- Skeleton Card 1 -->
        <div
          class="glass-card rounded-2xl p-0 h-full overflow-hidden border border-gray-100"
        >
          <div class="p-5 border-b border-gray-100 pt-10">
            <div class="flex justify-between items-center">
              <div>
                <div class="skeleton w-12 h-3 mb-2"></div>
                <div class="skeleton w-32 h-6"></div>
              </div>
              <div class="skeleton w-10 h-10 skeleton-circle"></div>
            </div>
          </div>
          <div class="p-5 space-y-6">
            <div class="space-y-2">
              <div class="skeleton w-16 h-4 rounded-full"></div>
              <div class="skeleton w-full h-16"></div>
            </div>
            <div class="space-y-2">
              <div class="skeleton w-16 h-4 rounded-full"></div>
              <div class="skeleton w-full h-16"></div>
            </div>
          </div>
        </div>

        <!-- Skeleton Card 2 (Copy Paste aja biar ada 2 atau 3) -->
        <div
          class="glass-card rounded-2xl p-0 h-full overflow-hidden border border-gray-100 hidden md:block"
        >
          <div class="p-5 border-b border-gray-100 pt-10">
            <div class="flex justify-between items-center">
              <div>
                <div class="skeleton w-12 h-3 mb-2"></div>
                <div class="skeleton w-32 h-6"></div>
              </div>
              <div class="skeleton w-10 h-10 skeleton-circle"></div>
            </div>
          </div>
          <div class="p-5 space-y-6">
            <div class="space-y-2">
              <div class="skeleton w-16 h-4 rounded-full"></div>
              <div class="skeleton w-full h-16"></div>
            </div>
            <div class="space-y-2">
              <div class="skeleton w-16 h-4 rounded-full"></div>
              <div class="skeleton w-full h-16"></div>
            </div>
          </div>
        </div>
      </div>
      <div
        id="heroQuoteContainer"
        class="mt-16 mb-8 max-w-3xl mx-auto px-4 opacity-0 translate-y-4 transition-all duration-700"
      >
        <!-- Isi Quote akan di-generate JS -->
      </div>
    </main>

    <!-- Footer -->
    <footer class="fixed bottom-0 w-full z-40 pointer-events-none">
      <div
        class="bg-gradient-to-t from-white via-white/90 to-transparent pb-6 pt-10 px-4 text-center"
      >
        <div
          class="inline-flex items-center gap-0 bg-white border border-gray-200 shadow-xl rounded-lg overflow-hidden pointer-events-auto transform hover:-translate-y-1 transition-transform duration-300"
        >
          <span
            class="text-[10px] font-bold text-gray-500 uppercase tracking-widest px-3 py-1.5 bg-gray-50"
            >Created by</span
          >
          <span
            class="bg-merah-indo text-white text-[10px] font-black px-3 py-1.5"
            >JAY</span
          >
        </div>
      </div>
    </footer>

    <!-- COACH WIDGET LEVEL MAX -->
    <div
      id="coachWidget"
      class="fixed bottom-6 right-6 z-[100] flex flex-col items-end group font-sans"
    >
      <!-- Bubble Chat (Desain Baru) -->
      <div
        id="coachBubble"
        class="mb-4 mr-1 px-5 py-4 bg-white/95 backdrop-blur-md text-gray-900 text-xs md:text-sm font-extrabold rounded-2xl rounded-br-none shadow-[0_10px_30px_rgba(0,0,0,0.3)] border-2 border-gray-900 max-w-[220px] text-right transform origin-bottom-right scale-0 opacity-0 transition-all duration-500 ease-[cubic-bezier(0.68,-0.55,0.27,1.55)] relative pointer-events-none"
      >
        <!-- Ikon Seru Kecil -->
        <div
          class="absolute -top-3 -left-3 w-6 h-6 bg-merah-indo rounded-full flex items-center justify-center text-white border-2 border-white shadow-md"
        >
          <i data-lucide="megaphone" class="w-3 h-3"></i>
        </div>

        <span id="coachText" class="leading-tight block">Siap grak!</span>

        <!-- Ekor Bubble -->
        <div
          class="absolute -bottom-[2px] -right-[2px] w-4 h-4 bg-gray-900 transform rotate-45 origin-center"
        ></div>
        <div
          class="absolute bottom-[2px] right-[2px] w-4 h-4 bg-white transform rotate-45 origin-center z-10 rounded-tl-full"
        ></div>
      </div>

      <!-- Foto Avatar Container -->
      <div
        class="relative w-16 h-16 md:w-20 md:h-20 cursor-pointer"
        onclick="forceTriggerCoach()"
      >
        <!-- 1. Efek Radar/Ripple (Animasi Terus Menerus) -->
        <div
          class="absolute inset-0 bg-red-500 rounded-full opacity-0 animate-ping-slow"
        ></div>
        <div
          class="absolute inset-0 bg-red-500 rounded-full opacity-0 animate-ping-slower"
        ></div>

        <!-- 2. Foto Coach -->
        <div
          id="coachIcon"
          class="relative w-full h-full rounded-full border-4 border-white shadow-2xl overflow-hidden hover:scale-105 transition-transform duration-300 z-20"
        >
          <!-- GANTI SRC INI DENGAN FOTO ASLI COACH -->
          <img src="assets/64.jfif" alt="Coach" class="w-full h-full object-cover" />
        </div>

        <!-- 3. Status Online -->
        <div
          class="absolute bottom-1 right-1 w-4 h-4 bg-green-500 border-2 border-white rounded-full z-30 shadow-sm animate-pulse"
        ></div>
      </div>
    </div>

    <!-- 5. JS CUSTOM -->
    <script src="script.js"></script>
  </body>
</html>
